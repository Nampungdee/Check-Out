<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>แบบฟอร์มรายงานกิจกรรม</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f0fdfa; touch-action: manipulation; }
        .mint-bg { background-color: #2dd4bf; }
        .input-field { border: 2px solid #e2e8f0; border-radius: 16px; width: 100%; padding: 0.8rem; background: white; font-size: 16px; font-weight: 400; }
        .case-card { background: white; margin-bottom: 1rem; padding: 1.2rem; border-radius: 25px; border-left: 10px solid #2dd4bf; position: relative; }
        .label-text { font-size: 1rem; font-weight: 400; color: #134e4a; margin-bottom: 0.2rem; display: block; }
        .sig-page { display: none; }
        .sig-container { position: relative; width: 100%; height: 250px; background: #fff; border: 3px solid #99f6e4; border-radius: 25px; overflow: hidden; touch-action: none; }
        #signature-pad { width: 100%; height: 100%; touch-action: none; }
        #signature-frozen-view { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; display: none; z-index: 20; object-fit: contain; pointer-events: none; }
    </style>
</head>
<body class="p-4 pb-10">

    <div class="max-w-md mx-auto pt-4">
        <div id="step1">
            <div class="mint-bg rounded-[30px] p-6 text-white text-center mb-6 shadow-lg">
                <h1 class="text-lg font-bold leading-tight">
                    รายงานกิจกรรมขณะปฏิบัติงานนอกเวลาราชการ<br>
                    นักศึกษาแพทย์ปีที่ 5 มหาวิทยาลัยนเรศวร<br>
                    กลุ่มงานสูติ - นรีเวชกรรมและวางแผนครอบครัว
                </h1>
            </div>
            
            <div class="bg-white rounded-[25px] p-5 shadow-sm mb-4">
                <div class="mb-3">
                    <label class="label-text">ชื่อ นสพ.</label>
                    <input type="text" id="name" class="input-field" placeholder="พิมพ์ชื่อถ้าไม่ขึ้น">
                </div>

                <div class="mb-3">
                    <label class="label-text">รหัสประจำตัวนิสิต</label>
                    <input type="text" id="studentId" class="input-field" placeholder="พิมพ์รหัสถ้าไม่ขึ้น">
                </div>
                
                <div class="grid grid-cols-2 gap-5 mb-4">
                    <div>
                        <label class="label-text">วันที่</label>
                        <input type="date" id="workDate" class="input-field">
                    </div>
                    <div>
                        <label class="label-text">เวลา</label>
                        <select id="shiftTime" class="input-field">
                            <option value="16.30 - 00.00"> 16.30 - 00.00</option>
                        </select>
                    </div>
                </div>
            </div>

            <div id="caseContainer"></div>
            <button onclick="addCase()" class="w-full border-2 border-dashed border-[#2dd4bf] text-[#0d9488] py-4 rounded-2xl mb-6 font-bold bg-white">+ เพิ่มเคสคนไข้</button>
            <button onclick="goToStep2()" class="w-full bg-[#0d9488] text-white p-6 rounded-[30px] font-bold text-xl shadow-lg">ต่อไป: ให้อาจารย์ลงนาม ➜</button>
        </div>

        <div id="step2" class="sig-page">
            <div class="bg-orange-400 rounded-[30px] p-6 text-white text-center mb-6 shadow-lg">
                <h1 class="text-xl font-bold">อาจารย์ลงนาม</h1>
            </div>
            
            <div class="bg-white rounded-[25px] p-6 shadow-sm mb-6 border-2 border-orange-100">
                <div class="flex justify-between items-center mb-3">
                    <label class="label-text m-0" style="font-weight: 700;">ลายเซ็นอาจารย์</label>
                    <button onclick="clearSig()" class="text-red-500 font-bold text-xs underline">ล้างจอ</button>
                </div>
                <div class="sig-container">
                    <canvas id="signature-pad"></canvas>
                    <img id="signature-frozen-view" alt="Signature View">
                </div>
                <div class="mt-6">
                    <label class="label-text">ชื่ออาจารย์ (ตัวบรรจง)</label>
                    <input type="text" id="staffName" class="input-field" placeholder="พิมพ์ชื่ออาจารย์">
                </div>
            </div>
            
            <div id="camera-section" class="bg-white rounded-[25px] p-5 shadow-sm mb-6 border-2 border-emerald-50 text-center">
                <div class="pb-4 flex justify-center">
                    <video id="camera-preview" width="70%" height="auto" autoplay playsinline
                           poster="https://upload.wikimedia.org/wikipedia/commons/thumb/6/65/No-Image-Placeholder.svg/330px-No-Image-Placeholder.svg.png"
                           class="rounded-lg border-2 border-gray-100 mb-2"></video>
                </div>
                <div class="flex justify-center">
                    <img id="preview" width="70%" height="auto" class="rounded-lg hidden" alt="Face Preview">
                </div>

                <div class="flex justify-center space-x-3 my-2">
                    <button class="w-full text-sm text-center py-3 px-4 rounded-xl bg-[#001D53] text-white font-bold opacity-30 pointer-events-none"
                            id="start-camera-btn" onclick="openCamera()">เปิดกล้อง</button>
                    <button class="w-full text-sm text-center py-3 px-4 rounded-xl bg-green-500 text-white font-bold hidden" 
                            id="capture-btn" onclick="takePhoto()">ถ่ายรูป</button>
                </div>
                <p class="text-center text-[10px] text-red-600 font-medium mt-3">** ให้เปลี่ยนชุด จากชุดสครับเป็นชุดนศพ. 🥼 ให้เรียบร้อย</p>
            </div>

            <div class="flex gap-3">
                <button onclick="goToStep1()" class="w-1/3 bg-gray-200 text-gray-600 p-5 rounded-[25px] font-bold">ย้อนกลับ</button>
                <button onclick="submitAll()" class="w-2/3 bg-[#0d9488] text-white p-5 rounded-[25px] font-bold text-lg shadow-lg">ส่งรายงาน ➜</button>
            </div>
        </div>
    </div>

    <script>
        // ⚠️ ใส่ URL ของ Web App ของคุณที่นี่:
        const WEB_APP_URL = "https://script.google.com/macros/s/ใส่_ID_ของคุณที่นี่/exec";

        let sigPad = null;
        let stream = null;
        let faceImg = "";
        let sigImg = "";

        // ... (โค้ดฟังก์ชันการทำงานอื่นๆ เหมือนเดิมทุกประการ) ...
        function addCase(isFirst = false) {
            const container = document.getElementById('caseContainer');
            if (!container) return;
            const div = document.createElement('div');
            div.className = 'case-card shadow-sm';
            const del = isFirst ? "" : `<button type="button" onclick="this.parentElement.remove()" class="absolute top-2 right-4 text-gray-300 text-2xl">×</button>`;
            div.innerHTML = `${del}
                <label class="label-text text-sm">ชื่อผู้ป่วย / HN</label>
                <input type="text" class="input-field p-in mb-2" placeholder="กรอกชื่อผู้ป่วย หรือ HN">
                <label class="label-text text-sm">Diagnosis</label>
                <input type="text" class="input-field d-in mb-2" placeholder="กรอกผลวินิจฉัย">
                <label class="label-text text-sm">กิจกรรม</label>
                <select class="input-field n-in">
                    <option value="P">P</option>
                    <option value="A">A</option>
                    <option value="O">O</option>
                </select>`;
            container.appendChild(div);
        }

        function goToStep2() { document.getElementById('step1').style.display = 'none'; document.getElementById('step2').style.display = 'block'; window.scrollTo(0,0); setTimeout(initSignature, 200); }
        function goToStep1() { document.getElementById('step2').style.display = 'none'; document.getElementById('step1').style.display = 'block'; }

        function initSignature() {
            const canvas = document.getElementById("signature-pad");
            if (!canvas) return;
            sigPad = new SignaturePad(canvas, { backgroundColor: 'rgba(255, 255, 255, 0)', penColor: 'rgb(0, 0, 0)', velocityFilterWeight: 0.5, minWidth: 1.0, maxWidth: 2.5 });
            sigPad.addEventListener("endStroke", () => { sigImg = sigPad.toDataURL(); document.getElementById('signature-frozen-view').src = sigImg; document.getElementById('signature-frozen-view').style.display = 'block'; checkNext(); });
        }

        function clearSig() { if (sigPad) sigPad.clear(); sigImg = ""; document.getElementById('signature-frozen-view').style.display = 'none'; checkNext(); }

        async function openCamera() {
            const video = document.getElementById('camera-preview');
            try {
                if (stream) { stream.getTracks().forEach(track => track.stop()); }
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream; video.classList.remove('hidden');
                document.getElementById('start-camera-btn').classList.add('hidden');
                document.getElementById('capture-btn').classList.remove('hidden');
            } catch (err) { Swal.fire('กล้องไม่ทำงาน', 'โปรดอนุญาตสิทธิ์กล้อง', 'warning'); }
        }

        function takePhoto() {
            const v = document.getElementById('camera-preview');
            const c = document.createElement('canvas');
            c.width = v.videoWidth; c.height = v.videoHeight;
            c.getContext('2d').drawImage(v, 0, 0);
            faceImg = c.toDataURL('image/jpeg', 0.6);
            document.getElementById('preview').src = faceImg;
            document.getElementById('preview').classList.remove('hidden');
            v.classList.add('hidden');
            if(stream) stream.getTracks().forEach(t => t.stop());
        }

        function checkNext() {
            const hasStaffName = document.getElementById('staffName').value.trim().length >= 2;
            const hasSignature = sigImg !== "";
            const startCamBtn = document.getElementById('start-camera-btn');
            if (hasStaffName && hasSignature) startCamBtn.classList.remove('opacity-30', 'pointer-events-none');
            else startCamBtn.classList.add('opacity-30', 'pointer-events-none');
        }

        document.addEventListener('input', (e) => { if (e.target.id === 'staffName') checkNext(); });

        function submitAll() {
            const cases = Array.from(document.querySelectorAll('.case-card')).map((c) => ({
                patient: c.querySelector('.p-in').value || "-", diag: c.querySelector('.d-in').value || "-", note: c.querySelector('.n-in').value
            }));
            const fullName = document.getElementById('name').value.trim();
            const studentIdValue = document.getElementById('studentId').value.trim();

            if(!sigImg || !faceImg || !fullName || !studentIdValue) return Swal.fire('ข้อมูลไม่ครบ', 'กรุณากรอกข้อมูลให้ครบครับ', 'warning');

            Swal.fire({ title: 'กำลังบันทึก...', didOpen: () => Swal.showLoading() });
            
            fetch(WEB_APP_URL, {
                method: "POST", mode: "no-cors",
                body: JSON.stringify({ studentName: fullName, studentId: studentIdValue, workDate: document.getElementById('workDate').value, shiftTime: document.getElementById('shiftTime').value, base64: faceImg, signature: sigImg, staffName: document.getElementById('staffName').value, cases: cases })
            })
            .then(() => { Swal.fire('สำเร็จ!', 'บันทึกข้อมูลเรียบร้อย', 'success').then(() => location.reload()); })
            .catch(() => Swal.fire('ผิดพลาด', 'ไม่สามารถเชื่อมต่อระบบ', 'error'));
        }
    </script>
</body>
</html>
